<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 小游戏合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px}
h1{font-size:48px;color:#fff;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.sub{color:rgba(255,255,255,.8);font-size:18px;margin-bottom:40px}
.card{display:inline-block;background:#fff;border-radius:16px;padding:32px;width:280px;box-shadow:0 10px 40px rgba(0,0,0,.2);transition:transform .3s;cursor:pointer;text-decoration:none;color:inherit}
.card:hover{transform:translateY(-8px)}
.emoji{font-size:64px;margin-bottom:16px}
.card h2{font-size:22px;margin-bottom:8px;color:#333}
.card p{color:#888;font-size:14px}
.btn{display:inline-block;margin-top:16px;padding:10px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:24px;font-size:14px;font-weight:600}
</style>
</head>
<body>
<div class="container">
<h1>🎮 小游戏合集</h1>
<p class="sub">点击卡片开始玩</p>
<a class="card" href="games/水循环.html">
<div class="emoji">💧</div>
<h2>神奇的水循环</h2>
<p>互动学习游戏，探索水循环的奥秘</p>
<div class="btn">开始玩 →</div>
</a>
</div>
</body>
</html>
